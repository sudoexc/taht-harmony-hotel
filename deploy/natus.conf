# /opt/neurofax/nginx/conf.d/natus.conf — vhosts Natus (лендинг + приложение).
# TLS: LE-серт natus.uz (+www, app, taht), выпускается/продлевается medbook-certbot.

# ── HTTP: ACME + редирект на HTTPS ───────────────────────────────────────────
server {
    listen 80;
    server_name natus.uz www.natus.uz app.natus.uz taht.natus.uz almalyk.natus.uz;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Лендинг ──────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name natus.uz www.natus.uz;

    ssl_certificate     /etc/letsencrypt/live/natus.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/natus.uz/privkey.pem;

    location / {
        proxy_pass http://natus-landing:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# ── Приложение (SPA + API под /api/) ─────────────────────────────────────────
server {
    listen 443 ssl;
    http2 on;
    server_name app.natus.uz taht.natus.uz almalyk.natus.uz;
    client_max_body_size 10m;

    ssl_certificate     /etc/letsencrypt/live/natus.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/natus.uz/privkey.pem;

    # API тем же доменом под /api/ — без CORS, куки same-origin
    location /api/ {
        proxy_pass http://natus-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://natus-web:80;
        proxy_set_header Host $host;
    }
}
