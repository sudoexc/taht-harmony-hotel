# /opt/neurofax/nginx/conf.d/natus.conf — vhosts Natus (лендинг + приложение).
# HTTP-фаза: за Cloudflare (proxied) HTTPS терминируется на CF.
# После выпуска LE-сертов добавить 443-блоки по образцу rtxshop.conf.

server {
    listen 80;
    server_name natus.uz www.natus.uz;

    location / {
        proxy_pass http://natus-landing:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

server {
    listen 80;
    server_name app.natus.uz taht.natus.uz;
    client_max_body_size 10m;

    # API тем же доменом под /api/ — без CORS, куки same-origin
    location /api/ {
        proxy_pass http://natus-api:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://natus-web:80;
        proxy_set_header Host $host;
    }
}
